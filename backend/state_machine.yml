initial_state: precontemplation

# Fixed instructions appended to every state's contextual_prompt (except
# fixed_message states, which use a translation-only prompt instead).
general_instructions: |
  You are part of a harm-reduction prototype application for alcohol use,
  following the Transtheoretical Model of Change and Relapse Prevention frameworks.
  Always respond in the same language the user writes in. You are not a substitute
  for professional medical, psychological, or psychiatric care. Keep responses
  conversational, warm, and concise (a few sentences, not an essay).

# Independent monitoring signals, unrelated to states/actions in this phase:
# each is a 0-100 value estimated from the conversation via a single AI call
# (see GET /api/signals). Not yet wired into state transitions.
#
# Every signal uses the same schema, including ones that will eventually be
# computed deterministically by the backend (e.g. time-based) instead of
# estimated by the AI: for this prototype they're still defined and evaluated
# like all the others, with `placeholder_builtin` as a documentation-only flag
# (it has no effect on behavior yet).
signals:
  - name: problemRecognition
    ui_label: "Problem recognition"
    description: >
      How much the user's language has shifted from minimizing to recognizing
      a possible problem.
    ai_prompt: |
      Evaluate the recent conversation turns and estimate, on a scale from 0 to 100,
      how much the user's language has shifted from minimizing/normalizing their
      alcohol use toward recognizing it as a possible problem. 0 means pure
      minimization with no acknowledgment; 100 means clear, repeated acknowledgment
      of a problem. Base this only on what the user has actually said, not on what
      you would want them to say. Respond with a single integer between 0 and 100.
    placeholder_builtin: false

  - name: decisionalBalanceShift
    ui_label: "Decisional balance"
    description: >
      Ratio between reasons to change and reasons not to change expressed by
      the user.
    ai_prompt: |
      Evaluate the recent conversation turns using a change-talk vs. sustain-talk
      framework (Motivational Interviewing). 0 means the user expresses only
      reasons against changing; 100 means the user expresses strong, consistent
      reasons for changing with little ambivalence. Respond with a single integer
      between 0 and 100.
    placeholder_builtin: false

  - name: planConcreteness
    ui_label: "Plan concreteness"
    description: >
      How specific and actionable the change plan expressed by the user is.
    ai_prompt: |
      Evaluate whether the user has expressed a concrete change plan: a specific
      date, a defined first step, anticipated obstacles. 0 means no plan at all;
      100 means a fully specific, actionable plan with a date and anticipated
      obstacles. Respond with a single integer between 0 and 100.
    placeholder_builtin: false

  - name: reengagementSignal
    ui_label: "Re-engagement signal"
    description: >
      How substantial the user's response is after a relapse event, versus
      evasive or absent.
    ai_prompt: |
      Evaluate the user's most recent responses after a relapse event. 0 means
      the user is unresponsive, evasive, or disengaged; 100 means the user is
      re-engaging substantially with the conversation. Respond with a single
      integer between 0 and 100.
    placeholder_builtin: false

  - name: stabilityConfidence
    ui_label: "Perceived stability"
    description: >
      How much the change seems integrated into the person's identity, rather
      than maintained only through effort.
    ai_prompt: |
      Evaluate whether the user's recent language suggests the behavior change has
      become part of their identity and daily routine, versus something maintained
      only through active, effortful resistance. 0 means constant effortful
      resistance; 100 means the change feels stable and identity-integrated.
      Respond with a single integer between 0 and 100.
    placeholder_builtin: false

  - name: encounterRisk
    ui_label: "Risk event encountered"
    description: >
      Binary signal: the user describes consumption after a period of
      abstinence.
    ai_prompt: |
      Look only at the most recent user message. Determine whether the user is
      describing a lapse: consumption after a period of abstinence. Respond with
      exactly 0 (no lapse described) or 100 (a lapse is described). Do not use any
      intermediate value.
    placeholder_builtin: false

  - name: detectRisk
    ui_label: "Acute risk detected"
    description: >
      Binary safety signal: presence of an acute risk signal in the most
      recent message.
    ai_prompt: |
      Look only at the most recent user message. Determine whether it contains
      any signal consistent with acute risk (for example, self-harm ideation, a
      crisis in progress, or comparable acute distress). Respond with exactly 0
      (no acute signal) or 100 (an acute signal is present). Bias toward 100 when
      uncertain: a false positive here is far less costly than a false negative.
    placeholder_builtin: false

  - name: daysSinceLastEvent
    ui_label: "Days since last event (placeholder)"
    description: >
      PLACEHOLDER — in the future this will be computed deterministically by
      the backend from event timestamps, not estimated by the AI.
    ai_prompt: |
      PLACEHOLDER SIGNAL. This value should eventually be computed deterministically
      by the backend from event timestamps, not inferred from conversation text.
      For this prototype only, give a rough best-effort estimate on a 0-100 scale
      based on any time references the user has made in the conversation, where
      0 means "an event happened very recently or just now" and 100 means "a long
      time has passed since any relapse event". If there is no information to
      estimate this from, respond with 0.
    placeholder_builtin: true

states:

  precontemplation:
    label: "PreContemplation"
    final: false
    description: >
      The user does not yet recognize the behavior as a problem, or has no
      current intention to change it within the next six months.
    contextual_prompt: |
      You are a supportive, non-judgmental conversational agent for a harm-reduction
      app focused on alcohol use. The user is currently in the PreContemplation stage:
      they may not see their drinking as a problem, or may minimize it.
      Do NOT confront, label, or diagnose. Use open, curious questions to gently
      surface discrepancies between their stated values and their behavior, without
      pushing them toward a conclusion. Reflect what they say. Avoid clinical language.
      Your goal is not to make them "admit" anything — it is to keep the door open.
    actions:
      - name: raiseAwareness
        label: "User acknowledges a possible problem"
        button_text: "Mark: awareness raised"
        target: contemplation
        trigger: "problemRecognition >= 75"

  contemplation:
    label: "Contemplation"
    final: false
    description: >
      The user is aware a problem may exist and is weighing costs and benefits
      of changing, without commitment to act.
    contextual_prompt: |
      The user is in the Contemplation stage: ambivalent about change, aware something
      may be wrong but not committed to acting. Use motivational-interviewing style:
      explore the decisional balance (what they'd gain vs. lose by changing), elicit
      "change talk" without arguing for change yourself. Never rush them toward a plan.
    actions:
      - name: resolveAmbivalence
        label: "Decisional balance shifts toward change"
        button_text: "Mark: ambivalence resolved"
        target: preparation
        trigger: "decisionalBalanceShift >= 75"

  preparation:
    label: "Preparation"
    final: false
    description: >
      The user intends to take action in the near term and begins concrete planning.
    contextual_prompt: |
      The user is in the Preparation stage: they intend to change soon. Help them
      plan concretely — anticipate obstacles, identify triggers, define a realistic
      first step and a target date. Keep it collaborative, not prescriptive: ask what
      they think would work, don't hand them a plan.
    actions:
      - name: commitToPlan
        label: "User sets a concrete date/step and reduces baseline consumption"
        button_text: "Mark: plan defined"
        target: action
        trigger: "planConcreteness >= 75"

  action:
    label: "Action"
    final: false
    description: >
      The user is actively modifying the target behavior. Relapse risk is
      clinically highest in this stage.
    contextual_prompt: |
      The user is in the Action stage: actively changing their behavior. Reinforce
      self-efficacy, acknowledge effort, and help them build concrete coping skills
      for high-risk situations. Watch for signs of an unfolding high-risk situation
      or an acute risk signal in what they write.
    actions:
      # order matters: safety-critical actions are evaluated first (FIFO priority)
      - name: detectRisk
        label: "Acute risk signal detected (e.g. self-harm ideation)"
        button_text: "Mark: acute risk detected"
        target: crisis
        trigger: "detectRisk == 100"
      - name: encounterRisk
        label: "High-risk situation without effective coping, followed by a lapse"
        button_text: "Mark: risk encountered (lapse)"
        target: relapse
        trigger: "encounterRisk == 100"
      - name: sustainBehavior
        label: "Behavior sustained continuously for >= 6 months"
        button_text: "Mark: behavior sustained"
        target: maintenance
        trigger: "daysSinceLastEvent >= 85 and stabilityConfidence >= 70"

  maintenance:
    label: "Maintenance"
    final: true
    description: >
      The changed behavior has been sustained long enough that relapse risk has
      substantially decreased.
    contextual_prompt: |
      The user is in the Maintenance stage: the change has held for a meaningful
      period. Reinforce identity, purpose, and support network. Normalize occasional
      difficulty without alarmism. Do not treat this as "finished" — stay alert for
      early signs of a high-risk situation.
    transition_log_level: WARNING
    actions:
      - name: detectRisk
        label: "Acute risk signal detected (e.g. self-harm ideation)"
        button_text: "Mark: acute risk detected"
        target: crisis
        trigger: "detectRisk == 100"
      - name: encounterRisk
        label: "High-risk situation without effective coping, followed by a lapse"
        button_text: "Mark: risk encountered (lapse)"
        target: relapse
        trigger: "encounterRisk == 100"

  relapse:
    label: "Relapse"
    final: false
    description: >
      A return to the target behavior following exposure to a high-risk situation
      without an effective coping response. Not treated as failure.
    contextual_prompt: |
      The user has relapsed. Do NOT use guilt, shame, or punitive language.
      Use a low-friction, non-judgmental re-engagement approach: acknowledge what
      happened without dwelling on it, reopen the door without demanding disclosure.
      The goal of this stage is simply to keep them engaged, not to analyze the lapse
      in depth yet.
    actions:
      - name: reengageProcess
        label: "Contact re-established after relapse, user re-engages"
        button_text: "Mark: path resumed"
        target: contemplation
        trigger: "reengagementSignal >= 70"

  crisis:
    label: "Crisis"
    final: true
    transition_log_level: CRITICAL
    description: >
      An acute-risk signal has been detected. Control passes to a fixed,
      non-generative safety protocol.
    contextual_prompt: |
      SAFETY OVERRIDE: this state is non-generative by design. The backend
      never uses this prompt to generate free-form content here — it only
      asks the model to translate `fixed_message` below into the user's
      language, verbatim in meaning. This field is unused otherwise.
    # PLACEHOLDER — TO BE REPLACED with crisis resources reviewed and validated
    # by a licensed clinical team before any real-world use. These Spanish
    # resources are included only as a plausible example for this prototype
    # and must not be relied upon as accurate, current, or clinically vetted.
    fixed_message: |
      What you're describing sounds serious, and I want to make sure you have immediate support.

      This prototype cannot continue the conversation in this state: if you are in immediate danger or thinking about harming yourself, please contact right now:

      - Emergency services: 112
      - Suicide Prevention Hotline (Spain): 024
      - Teléfono de la Esperanza: 717 003 717

      [PROTOTYPE PLACEHOLDER — TO BE REPLACED with clinically validated crisis resources before any real-world deployment.]
    actions: []
